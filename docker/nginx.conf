# Inventory self-host nginx vhost — fronts php-fpm, serves the WinterCMS public/
# mirror. The SPA (vue-inventory-app) is built & served separately; this serves
# the backend + the Inventory JSON API (/_inventory/api/v1/*).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    # Hide dotfiles and sensitive paths.
    location ~ /\.(?!well-known) {
        deny all;
    }
    # Serve Inventory public media (photo/thumb URLs the serializer emits
    # relative: /storage/app/uploads, /storage/app/resized, /storage/app/media).
    # The ^~ prefix match is evaluated ahead of the later "deny all" ~* regex, so
    # these win (HTTP 200). Use `alias` to the REAL storage/app dir rather than a
    # root+try_files against public/ — winter:mirror only symlinks dirs that exist
    # at mirror time, so storage/app/uploads (created on first upload) would 404
    # via the public mirror. alias serves the live files regardless of mirror
    # timing. NB: do NOT add try_files here — try_files+alias is a known nginx
    # footgun (it concatenates the full URI onto the alias and always 404s);
    # alias alone returns 404 naturally for missing files.
    location ^~ /storage/app/ {
        alias /var/www/html/storage/app/;
        expires 7d;
        access_log off;
    }

    # Everything else sensitive under /storage stays denied (logs, framework,
    # cms, persisted .env, composer, bootstrap).
    location ~* /(\.env|composer\.(json|lock)|storage|bootstrap)/ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot|webp)$ {
        expires 7d;
        access_log off;
        try_files $uri /index.php?$query_string;
    }
}
