# Inventory self-host nginx vhost — fronts php-fpm, serves the WinterCMS public/
# mirror. The SPA (vue-inventory-app) is built & served separately; this serves
# the backend + the Inventory JSON API (/_inventory/api/v1/*).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html;
    index index.php;

    client_max_body_size 20M;

    # Hide dotfiles and sensitive paths.
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~* /(\.env|composer\.(json|lock)|storage|bootstrap)/ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot|webp)$ {
        expires 7d;
        access_log off;
        try_files $uri /index.php?$query_string;
    }
}
