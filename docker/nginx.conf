# Inventory self-host nginx vhost — fronts php-fpm, serves the WinterCMS public/
# mirror. The SPA (vue-inventory-app) is built & served separately; this serves
# the backend + the Inventory JSON API (/_inventory/api/v1/*).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    # Hide dotfiles and sensitive paths.
    location ~ /\.(?!well-known) {
        deny all;
    }
    # Serve the public media mirror (Inventory photo/thumb URLs the serializer
    # emits relative: /storage/app/uploads, /storage/app/resized). The ^~ prefix
    # match is evaluated ahead of the later "deny all" ~* regex once it is the
    # longest matching prefix, so served uploads/resized win (HTTP 200).
    location ^~ /storage/app/ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    # Everything else sensitive under /storage stays denied (logs, framework,
    # cms, persisted .env, composer, bootstrap).
    location ~* /(\.env|composer\.(json|lock)|storage|bootstrap)/ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 120s;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot|webp)$ {
        expires 7d;
        access_log off;
        try_files $uri /index.php?$query_string;
    }
}
