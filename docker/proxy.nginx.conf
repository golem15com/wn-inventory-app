# =============================================================================
# Inventory edge proxy — unifies the origin (D-13).
# =============================================================================
# Owns the public port and splits traffic SAME-ORIGIN:
#   /_inventory/api, /_user/api, /_journal/api, /api/realtime, /storage,
#   /backend, /modules, /plugins, /themes, /favicon.ico  → app container
#   everything else (/ + SPA client routes)               → spa container
#
# nginx longest-prefix matching guarantees the backend/API/storage prefixes are
# matched BEFORE the catch-all `location /`, so API errors are never masked by
# the SPA history fallback (T-11-28).
# =============================================================================

upstream app_backend { server app:80; }    # php-fpm/nginx app container (alias "app")
upstream spa_frontend { server spa:80; }    # static-nginx SPA container ("spa")

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Match the app vhost so AI photo uploads pass through the proxy.
    client_max_body_size 20M;

    # --- Backend + API + Winter assets + storage → app container (same-origin) -
    location /_inventory/api { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }
    location /_user/api      { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }
    location /_journal/api   { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }
    location /api/realtime   { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }
    location /storage        { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }
    location /backend        { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }
    location /modules        { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }
    location /plugins        { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }
    location /themes         { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }
    location = /favicon.ico  { proxy_pass http://app_backend; include /etc/nginx/proxy_headers.conf; }

    # --- Everything else (/ + SPA client routes) → static SPA container --------
    location / { proxy_pass http://spa_frontend; include /etc/nginx/proxy_headers.conf; }
}
