# Inventory SPA vhost — serves the static `nuxt generate` bundle ONLY.
# The edge proxy (docker/proxy.nginx.conf) fronts this and routes all API /
# /storage / /backend traffic to the app container, so this server never proxies
# the backend. It only needs to serve static assets + the SPA history fallback.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed build assets (immutable filenames from nuxt generate).
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|webp|ico)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # SPA history fallback: deep client routes resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
