# Shared proxy header block — included by EVERY location in proxy.nginx.conf.
# Forwarding the real Host + scheme is required so Winter's LINK_POLICY=force +
# APP_URL build correct backend redirect/asset URLs (T-11-25).
# Use $http_host (NOT $host) so the public port (:8088) is preserved — $host drops
# the port, which made upstreams emit portless absolute redirects (lost session).
proxy_set_header Host $http_host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_http_version 1.1;
