# Shared proxy header block — included by EVERY location in proxy.nginx.conf.
# Forwarding the real Host + scheme is required so Winter's LINK_POLICY=force +
# APP_URL build correct backend redirect/asset URLs (T-11-25).
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_http_version 1.1;
