name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the sections below
        so we can reproduce and fix the problem. **Do not include any secrets** (API keys,
        tokens, `.env` values) in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including expected vs. actual behaviour.
      placeholder: When I ... I expected ... but instead ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The minimal steps someone else can follow to see the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which release or commit are you running?
      placeholder: "v1.0.0 or a commit SHA"
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Deployment type, PHP version, database, browser (for SPA issues).
      placeholder: "Docker (full profile), PHP 8.4, PostgreSQL, Firefox"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Any relevant log output or screenshots. Redact secrets first.
    validations:
      required: false
