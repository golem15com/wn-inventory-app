# .gitleaks.toml — Inventory secret-scan baseline (Phase 13 / SAFE-03)
#
# Inherit gitleaks' built-in rule pack, then allowlist ONLY two known-safe
# FILE-PATH zones so the full-history baseline scan is LITERALLY zero hits
# (D-12 / D-13). The allowlist is deliberately path-scoped — NO broad secret
# regex / stopword that could mask a real future key (Pitfall 6 / T-13-11).
[extend]
useDefault = true

[allowlist]
description = "Baseline allowlist — deliberate test fixture + vendored third-party defaults (D-12/D-13)"
# (Phase 14 / AUDIT-03) Suppress ONLY the exact CompreFace third-party DEFAULT
# OAuth client credential baked into the shared Golem15.Golem plugin
# (classes/services/CompreFaceClient.php + models/FaceSettings.php). The literal
# base64 below decodes to "CommonClientId:password" — CompreFace's own DOCUMENTED
# public default from its application.yml (an upstream third-party default, NOT a
# Golem15 secret), same disposition class as the Phase-13 vendored Froala key.
# A NARROW exact-literal regex (no broad secret-regex / stopword) keeps T-13-11
# intact so a real future key is still caught.
regexes = [
  '''Q29tbW9uQ2xpZW50SWQ6cGFzc3dvcmQ=''',
]
paths = [
  # (1) Deliberate fake secrets used to PROVE leak detection (sk-member-attempt,
  #     sk-owner-secret, sk-never-echoed-secret, sk-org-a, sk-org-b). Allowlisted
  #     by FILE PATH only, so a real sk- key elsewhere is still caught (Pitfall 6).
  '''plugins/golem15/inventory/tests/security/OrgAiCredentialLeakTest\.php''',
  # (2) Vendored WinterCMS-core richeditor assets — the public upstream Froala
  #     WYSIWYG license/activation key ($.FroalaEditor.DEFAULTS.key) shipped in
  #     every Winter/October install (commit 7d39577). A dispositioned non-secret
  #     (NOT our credential), scoped by FILE PATH only to this vendored-core dir.
  '''^modules/backend/formwidgets/richeditor/assets/js/''',
]
